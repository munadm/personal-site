name: CI

# Build the static site and run the full Playwright suite (fold + a11y) on
# every push to main and every pull request. The VoiceOver launch gate is NOT
# run here — see voiceover-gate.yml.
#
# On push to main only, a deploy job then publishes dist/ to Cloudflare Pages.
# See deploy_guide.md for setup and debugging.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # `npm test` == `playwright test`; the config's webServer rebuilds and
      # previews the site, and the default projects cover fold + a11y (the
      # voiceover project is excluded unless VOICEOVER=1).
      - name: Run Playwright suite (fold + a11y)
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Publish to Cloudflare Pages. Gated to pushes on main (never PRs) and only
  # runs after build-and-test passes. Requires the CLOUDFLARE_API_TOKEN and
  # CLOUDFLARE_ACCOUNT_ID repo secrets — see deploy_guide.md.
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents: write lets the job push the deploy-* tag below.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=personal-site --branch=main

      # Record what went to production and when. Deliberately deploy-*, NOT
      # v* — v* tags are the VoiceOver launch gate (voiceover-gate.yml).
      - name: Tag deployed commit
        run: |
          TAG="deploy-$(date -u +%Y%m%d-%H%M%S)"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
