name: VoiceOver launch gate

# LAUNCH GATE — not a PR gate.
#
# This runs the REAL macOS VoiceOver narration test (tests/voiceover/*.voiceover.spec.ts)
# via @guidepup/playwright. VoiceOver control is macOS-only and must be granted
# before the run; in CI that's done by the official guidepup setup action
# (guidepup/setup-action), which is the CI equivalent of running
# `npx guidepup setup` locally. Because it's slow and macOS-bound, it is
# deliberately kept OUT of ci.yml / PR checks and gated to run only:
#   - manually (workflow_dispatch),
#   - on release tags (push of a v* tag), i.e. right before/at a launch, and
#   - on pushes to main that touch narration-relevant files (paths below) —
#     dynamic confidence: changes that CAN'T alter what the homepage narrates
#     cost no macOS minutes; changes that can get the real check automatically,
#     with no one having to remember to run it.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main
    # Keep this list in sync with what the gate actually narrates: the
    # homepage (skip link, header/nav, h1) plus the harness itself.
    paths:
      - 'src/pages/index.astro'
      - 'src/layouts/**'
      - 'src/components/SiteHeader.astro'
      - 'src/components/SiteFooter.astro'
      - 'src/components/ThemeToggle.astro'
      - 'src/components/RuleLogo.astro'
      - 'src/components/HeroRules.astro'
      - 'tests/voiceover/**'
      - 'playwright.config.ts'
      - '.github/workflows/voiceover-gate.yml'

jobs:
  voiceover:
    # Pinned to a settled macOS rather than macos-latest. macos-latest currently
    # resolves to macOS 26, on which guidepup's real-VoiceOver startup timed out
    # ("Timed out waiting for VoiceOver to be running"). guidepup drives the OS
    # screen reader, so it is sensitive to the macOS image; macos-15 is a
    # well-exercised platform for it. Revisit when guidepup officially supports 26.
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Grants VoiceOver automation permission on the runner — the CI
      # equivalent of running `npx guidepup setup` locally once. Without this
      # the voiceover project cannot drive VoiceOver.
      - name: Set up guidepup / VoiceOver
        uses: guidepup/setup-action@0.21.0

      # Only the `voiceover` project runs here. VOICEOVER=1 registers it in
      # playwright.config.ts (it is not part of the default suite). The
      # config's webServer rebuilds + previews the site on :4321.
      - name: Run VoiceOver narration gate
        run: VOICEOVER=1 npx playwright test --project=voiceover

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: voiceover-report
          path: playwright-report/
          retention-days: 14
