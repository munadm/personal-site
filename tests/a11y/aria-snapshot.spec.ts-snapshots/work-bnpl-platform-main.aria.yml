  - definition: /Maintainer standing in the shared checkout codebase in two quarters · review cycle from two weeks to ship-when-done · \$[\d,.]+[bkmBKM]+ incremental TPV from five experiments in one quarter/
  - heading "The blocker" [level=2]
  - paragraph: Our credit business was fast-growing, but structurally it was a passenger. Every change we needed to make lived inside the core checkout codebase, and we had no independent presence there. As with any critical shared codebase, changes from outside teams moved through conservative, high-touch review, and our pull requests sat behind weeks of manual walkthroughs. Priority depended on relationships rather than an agreed process, which meant our roadmap was only ever as fast as the goodwill we could borrow.
  - paragraph: "The real problem wasn't the review queue. It was that no one had defined what my team was: what we owned, what we were accountable for, and on what terms we were allowed to touch a codebase other people depended on to keep the company running. Until that was settled, every delivery conversation would keep collapsing back into a negotiation."
  - heading "The give-get" [level=2]
  - paragraph: "I started with the politics, not the code. I went to the platform's leadership with a deliberately lopsided proposal: we would make no claim on ownership of their codebase, their architecture, or their roadmap. In return, I asked them to treat my engineers like new hires on their own team — the same onboarding, the same access, the same ramp-up anyone joining their team would get."
  - paragraph: That framing mattered. I wasn't asking for a shortcut or an exception; I was asking to be held to their standard. Alongside it, I formalized my team as the single point of accountability for all BNPL changes. If something we shipped broke, the buck stopped with us, not with a platform engineer who happened to approve the PR. For a team that had been treated as a risk to be managed, becoming the clear owner of that risk was the thing that made trust possible.
  - heading "Earning it" [level=2]
  - paragraph: Access on paper isn't the same as trust in practice, so I structured the next two quarters to earn it in the open. I integrated my team into both our own roadmap and the platform's, and paired junior engineers as genuine capacity against the platform team's own goals, not just ours — if we wanted to be treated as insiders, we had to carry insider work. I built relationships at the staff-engineer level so the technical trust ran peer-to-peer and didn't depend on me being in the room.
  - paragraph: "Then I proposed a one-quarter probationary period and asked for the opposite of a light touch: I invited extreme scrutiny of everything we shipped. That was the whole point. A team that welcomes hard review is a team you stop needing to police. Once we had proven the model held, I wrote it up as a repeatable \"ladder of trust\" — the concrete stages a partner team moves through, from supervised contributions to full maintainer standing — so the next team wouldn't have to reinvent the path we'd walked."
  - heading "What it produced" [level=2]
  - paragraph: /Within two quarters my team held maintainer access and the L2 designation for all BNPL production issues — we owned our own incidents end to end\. The review cycle went from a two-week walkthrough to ship-when-done, which roughly doubled our project output inside the shared codebase\. The quarter after full integration, we shipped five experiments that generated nearly \$[\d,.]+[bkmBKM]+ in additional total payment volume\./
  - paragraph: The innersource model outgrew my team. The onboarding program we owned grew the platform's contributor roster to twenty engineers across multiple teams, run as a quarterly intake. The following year, my team was named a critical partner on a ground-up overhaul of the checkout experience spanning the entire credit portfolio — the clearest signal that we'd stopped being a team that needed permission and become one the platform planned around.
  - heading "Scaling the team behind it" [level=2]
  - paragraph: All of this ran on a team I built from scratch, fully remote, in the years after the pandemic. I grew it from ten to twenty-six engineers using a pod model — three to four engineers and a lead per pod — and leaned on Tuckman's forming-storming- norming-performing stages to be honest with myself about where each pod actually was rather than where the org chart said it should be. Pods demoed culture wins alongside delivery wins, because a team that only ever measures shipped tickets quietly stops investing in how it works. The product org later mirrored the same pod structure across two of its verticals, and I promoted one of my strongest tech leads into an engineering manager role.
  - heading "What I'd tell another EM" [level=2]
  - paragraph: "The instinct when your team is blocked is to escalate the blocker. What actually worked was the opposite: I gave up every claim I didn't need, took on more accountability than anyone asked for, and invited the scrutiny most people spend their energy avoiding. Trust in a shared codebase isn't granted by leadership and it isn't won in a negotiation — it's earned in public, on someone else's standard, and then written down so the next team doesn't have to earn it from zero."
