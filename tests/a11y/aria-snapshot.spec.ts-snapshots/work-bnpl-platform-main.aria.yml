  - paragraph: /Case study \d+/
  - heading "Leading BNPL platform engineering at PayPal" [level=1]
  - paragraph: /When I joined PayPal's Buy-Now-Pay-Later team in \d+, we were seven engineers with an ambitious roadmap and no reliable path to ship it\. Every change we owned ran through PayPal's core checkout platform, and we had no standing there\. This is how I turned a dependent team into a first-class engineering partner in one of the company's most critical codebases, and the framework we left behind so other teams could do the same\./
