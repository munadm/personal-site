      - heading "A KCS innersource API adopted cross-org" [level=2]
      - paragraph: Built and championed an innersource program around a shared API, applying Knowledge-Centered Service practices so contribution and review knowledge compounded instead of living in one team’s heads. Adoption spread organically to other engineering groups, cutting review cycles and duplicated work.
      - paragraph: Adopted by multiple engineering teams beyond the originating org
      - paragraph: Case study in progress.
