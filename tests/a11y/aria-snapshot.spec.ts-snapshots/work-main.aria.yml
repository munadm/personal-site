      - heading "The simplification layer that shipped a rewrite's outcome without the rewrite" [level=2]:
        - link "The simplification layer that shipped a rewrite's outcome without the rewrite":
          - /url: /work/simplification-layer
      - paragraph: "Owned how the credit domain would position itself in a ground-up rewrite of PayPal's checkout, on an aggressive next-quarter deadline in a system that sits on top of payments. When the two options on the table were both wrong, I found a third: a deliberate, throwaway simplification layer over the legacy system that forced every business case into the open before we touched the new architecture. It shipped on deadline with full credit parity from day one."
      - paragraph: Shipped on the go-to-market deadline · the pattern replicated by other domains
      - paragraph:
        - link "Read the case study":
          - /url: /work/simplification-layer
