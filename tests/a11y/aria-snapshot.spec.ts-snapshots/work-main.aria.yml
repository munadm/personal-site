      - paragraph: /Case study \d+/
      - heading "An LLM-driven PII scanner" [level=2]
      - paragraph: Directed the design and delivery of an internal scanner that uses an LLM to flag personally identifiable information in code and logs before it ships, catching a class of privacy risk that pattern-matching tools miss. Built for CI integration with low false-positive overhead.
      - paragraph: Integrated into CI/CD pipelines as a standing compliance control
      - paragraph: Case study in progress.